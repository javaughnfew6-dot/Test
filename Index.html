<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Assist – Login</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f9ff;
  margin: 0;
}

.container {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
  width: 320px;
  text-align: center;
}

.wave {
  font-size: 40px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #0077cc;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">
  <div class="box">
    <div class="wave">🐬</div>
    <h2>Vault Assist</h2>
    <p>Wave AI welcomes you</p>

    <!-- GitHub Pages compatible navigation -->
    <form action="dashboard.html">
      <input type="text" placeholder="Employee Name" required>
      <input type="email" placeholder="Work Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Enter Dashboard</button>
    </form>

  </div>
</div>
</body>
</html>
