<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultAssist</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#eef6ff;
}

.hidden { display:none; }

.login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:30px;
  width:320px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  background:#0077cc;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.sidebar {
  position:fixed;
  width:220px;
  height:100vh;
  background:#0077cc;
  color:white;
  padding:20px;
}

.main {
  margin-left:240px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.good { color:green; }
.warn { color:orange; }
.bad { color:red; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="box">
    <div style="font-size:40px;">🐬</div>
    <h2>VaultAssist</h2>
    <input id="name" placeholder="Name">
    <select id="role">
      <option value="Employee">Employee</option>
      <option value="Manager">Manager</option>
    </select>
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div class="sidebar">
    <h2>VaultAssist</h2>
    <p>📊 Analytics</p>
    <p>💰 Loans</p>
    <p>🤖 Wave AI</p>
    <p onclick="logout()" style="cursor:pointer;">🚪 Logout</p>
  </div>

  <div class="main">
    <h1 id="welcome"></h1>

    <div class="card">
      <h3>Add Loan</h3>
      <input id="customer" placeholder="Customer Name">
      <input id="amount" type="number" placeholder="Loan Amount">
      <input id="purpose" placeholder="Purpose">
      <button onclick="addLoan()">Add Loan</button>
    </div>

    <div class="card">
      <h3>Loans</h3>
      <div id="loanList"></div>
    </div>

    <div class="card">
      <h3>Workplace Insight</h3>
      <button onclick="setStress(1)">Good</button>
      <button onclick="setStress(2)">Neutral</button>
      <button onclick="setStress(3)">Stressed</button>
      <p id="stressText"></p>
    </div>

    <div class="card">
      <h3>🐬 Wave AI</h3>
      <p id="aiText"></p>
    </div>
  </div>
</div>

<script>
let loans = [];
let stress = 1;

function login() {
  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;

  document.getElementById("welcome").innerText =
    "Welcome " + name + " (" + role + ")";

  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  updateAI();
}

function logout() {
  location.reload();
}

function addLoan() {
  const customer = document.getElementById("customer").value;
  const amount = document.getElementById("amount").value;
  const purpose = document.getElementById("purpose").value;

  if (!customer || !amount) {
    alert("Fill all fields");
    return;
  }

  loans.push({ customer, amount, purpose });
  renderLoans();
  updateAI();
}

function renderLoans() {
  const list = document.getElementById("loanList");
  list.innerHTML = "";

  loans.forEach(l => {
    list.innerHTML += `<p>${l.customer} – $${l.amount} (${l.purpose})</p>`;
  });
}

function setStress(level) {
  stress = level;
  const t = document.getElementById("stressText");

  if (level === 1) t.innerHTML = "<span class='good'>Healthy</span>";
  if (level === 2) t.innerHTML = "<span class='warn'>Moderate</span>";
  if (level === 3) t.innerHTML = "<span class='bad'>High Stress</span>";

  updateAI();
}

function updateAI() {
  let text = "✅ System stable.";

  if (loans.length > 3) {
    text = "⚠️ High loan volume detected.";
  }
  if (stress === 3) {
    text += "<br>🧠 Employee stress elevated. Consider rest.";
  }

  document.getElementById("aiText").innerHTML = text;
}
</script>

</body>
</html>
``
