<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault Assist – Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef6ff;
}

.sidebar {
  width: 220px;
  height: 100vh;
  background: #0077cc;
  color: white;
  position: fixed;
  padding: 20px;
}

.sidebar p {
  cursor: pointer;
  margin: 10px 0;
}

.main {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.progress {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 20px;
  width: 63%;
  background: #0077cc;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}

button {
  padding: 5px 10px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Vault Assist</h2>
  <p>📊 Analytics</p>
  <p>💰 Loans</p>
  <p>🧠 Insights</p>
  <p>⚠️ Reports</p>
  <p>🤖 Wave AI</p>
</div>

<div class="main">
  <h1>Employee Dashboard</h1>

  <div class="card">
    <h3>Total Loan Value: $12,000,000</h3>
    <h4>Monthly Progress</h4>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
    <p>63% Complete</p>
  </div>

  <div class="card">
    <h3>Submit Loan</h3>
    <input placeholder="Customer Name">
    <input placeholder="Email">
    <input placeholder="Phone">
    <input placeholder="Loan Amount">
    <input placeholder="Purpose">
    <button>Add Loan</button>
  </div>

  <div class="card">
    <h3>Loan Requests</h3>
    <p>John Doe – $5,000 – Car</p>
    <button>Accept</button>
    <button>Decline</button>
    <button>Pending</button>
  </div>

  <div class="card">
    <h3>Workplace Insight</h3>
    <button>Good</button>
    <button>Neutral</button>
    <button>Stressed</button>
    <button>Report Issue</button>
  </div>
</div>

</body>
</html>
