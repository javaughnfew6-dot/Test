<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultAssist</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#eef6ff; }
.hidden { display:none; }

/* LOGIN */
.login-container {
  height:100vh; display:flex; justify-content:center; align-items:center;
}
.login-box {
  background:white; padding:30px; border-radius:15px;
  width:320px; box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}
input, select {
  width:100%; padding:10px; margin:8px 0;
  border-radius:8px; border:1px solid #ccc;
}
button {
  width:100%; padding:10px;
  background:#0077cc; color:white;
  border:none; border-radius:8px; cursor:pointer;
}

/* DASHBOARD */
.sidebar {
  width:220px; height:100vh; position:fixed;
  background:#0077cc; color:white; padding:20px;
}
.main {
  margin-left:240px; padding:20px;
}
.card {
  background:white; padding:15px;
  border-radius:10px; margin-bottom:15px;
}
.progress { background:#ddd; border-radius:10px; overflow:hidden; }
.progress-bar { height:20px; background:#0077cc; }
.status-good { color:green; }
.status-warn { color:orange; }
.status-bad { color:red; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
  <div class="login-box">
    <div style="font-size:40px;">🐬</div>
    <h2>VaultAssist</h2>
    <p>Wave AI Secure Access</p>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <select id="role">
      <option value="employee">Employee</option>
      <option value="manager">Manager</option>
    </select>
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="sidebar">
    <h2>VaultAssist</h2>
    <p>📊 Analytics</p>
    <p>💰 Loans</p>
    <p>🧠 Insights</p>
    <p>🤖 Wave AI</p>
    <p onclick="logout()" style="cursor:pointer;">🚪 Logout</p>
  </div>

  <div class="main">
    <h1 id="welcome"></h1>

    <!-- ANALYTICS -->
    <div class="card">
      <h3>Total Loans</h3>
      <p id="loanTotal">$0</p>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p id="progressText"></p>
    </div>

    <!-- ADD LOAN -->
    <div class="card">
      <h3>Submit Loan</h3>
      <input id="customer" placeholder="Customer Name">
      <input id="amount" type="number" placeholder="Loan Amount">
      <input id="purpose" placeholder="Purpose">
      <button onclick="addLoan()">Add Loan</button>
    </div>

    <!-- LOANS -->
    <div class="card">
      <h3>Loan Requests</h3>
      <div id="loanList"></div>
    </div>

    <!-- WORKPLACE INSIGHT -->
    <div class="card">
      <h3>Workplace Insight</h3>
      <button onclick="setStress(1)">😊 Good</button>
      <button onclick="setStress(2)">😐 Neutral</button>
      <button onclick="setStress(3)">😣 Stressed</button>
      <p id="stressStatus"></p>
    </div>

    <!-- WAVE AI -->
    <div class="card">
      <h3>🤖 Wave AI Insight</h3>
      <p id="aiOutput"></p>
    </div>

  </div>
</div>

<script>
let loans = JSON.parse(localStorage.getItem("loans")) || [];
let stress = 1;
let userRole = "";

function login() {
  const name = document.getElementById("name").value;
  userRole = document.getElementById("role").value;
  document.getElementById("welcome").innerText =
    `Welcome ${name} (${userRole})`;
  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  updateDashboard();
}

function logout() {
  location.reload();
}

function addLoan() {
  const c = customer.value;
  const a = Number(amount.value);
  const p = purpose.value;

  if (!c || !a) return alert("Fill all fields");

  loans.push({ c, a, p, status:"Pending" });
  localStorage.setItem("loans", JSON.stringify(loans));
  updateDashboard();
}

function updateDashboard() {
  loanList.innerHTML = "";
  let total = 0;

  loans.forEach((l, i) => {
    total += l.a;
    loanList.innerHTML += `
      <p>
        ${l.c} — $${l.a} (${l.p})
        ${userRole === "manager"
          ? `<button onclick="approve(${i})">✅</button>
             <button onclick="decline(${i})">❌</button>` : ""}
      </p>`;
  });

  loanTotal.innerText = `$${total.toLocaleString()}`;
  progressBar.style.width = Math.min(total / 20000000 * 100, 100) + "%";
  progressText.innerText = `${Math.round(total / 20000000 * 100)}% of target`;

  waveAI(total);
}

function approve(i) {
  loans[i].status = "Approved";
  localStorage.setItem("loans", JSON.stringify(loans));
  updateDashboard();
}

function decline(i) {
  loans[i].status = "Declined";
  localStorage.setItem("loans", JSON.stringify(loans));
  updateDashboard();
}

function setStress(level) {
  stress = level;
  localStorage.setItem("stress", level);
  updateStress();
}

function updateStress() {
  if (stress === 1) stressStatus.innerHTML = "Status: <span class='status-good'>Healthy</span>";
  if (stress === 2) stressStatus.innerHTML = "Status: <span class='status-warn'>Moderate</span>";
  if (stress === 3) stressStatus.innerHTML = "Status: <span class='status-bad'>High Stress</span>";
}

function waveAI(total) {
  let msg = "";

  if (total > 15000000)
    msg += "⚠️ High loan exposure detected. Review approvals.<br>";

  if (stress === 3)
    msg += "🧠 Employee stress elevated. Consider workload balancing.<br>";

  if (!msg)
    msg = "✅ Operations stable. No immediate risks.";

  aiOutput.innerHTML = msg;
  updateStress();
}

updateStress();
</script>

</body>
</html>
``
